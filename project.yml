# XcodeGen project spec — alternative to the pre-generated .xcodeproj
# Usage: brew install xcodegen && xcodegen generate

name: RecipeExtractor
options:
  bundleIdPrefix: com.recipeextractor
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  RecipeExtractor:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - RecipeExtractor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recipeextractor.app
        INFOPLIST_FILE: RecipeExtractor/Info.plist
        CODE_SIGN_ENTITLEMENTS: RecipeExtractor/RecipeExtractor.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: '"RecipeExtractor/Products.storekit"'
        DEVELOPMENT_TEAM: ""  # Set your Apple Developer Team ID here
    dependencies:
      - framework: StoreKit.framework
        weak: false
